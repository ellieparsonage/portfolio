title: Pokket Film Festival
number: "07"
order: 7
category: Branding
description: Logo design and branding for London-based short film festival,
  Pokket. The festival's aim is to give people an opportunity to ‘create without
  reason, using something most people have in their pocket (a smartphone)’. The
  client wanted the design to reflect the fun, lighthearted tone of the festival
  while still looking well thought out and professional.
