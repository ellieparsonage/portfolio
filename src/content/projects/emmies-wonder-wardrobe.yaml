category: Branding & Character Design
description: Full branding for a new spin-off show called Emmie's Wonder
  Wardrobe. The design needed to represent the core creative values of the
  brand, which are “glitter & sparkle”, “more is more” and “5 year old energy”,
  while appealing to the show's target audience (3 to 5 year olds). The project
  included logo design, full brand guidelines, character elements and props,
  social posts and album covers, collaborating with multiple teams across the
  company as well as an external animation studio.
